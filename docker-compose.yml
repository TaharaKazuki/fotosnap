services:
  db:
    image: postgres:17
    container_name: fotosnap-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fotosnap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fotosnap}
      POSTGRES_DB: ${POSTGRES_DB:-fotosnap}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
